name: Windows RDP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          net user runneradmin P@ssw0rd!
      
      - name: Download ngrok
        run: |
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          Expand-Archive -Path "ngrok.zip" -DestinationPath "." -Force
      
      - name: Setup ngrok
        run: |
          .\ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
      
      - name: Start ngrok Tunnel
        run: |
          Start-Process -NoNewWindow -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389"
          Start-Sleep -Seconds 3
      
      - name: Get ngrok Tunnel Info
        run: |
          $response = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
          $public_url = $response.tunnels[0].public_url -replace "tcp://", ""
          Write-Host "==============================================" -ForegroundColor Green
          Write-Host "RDP Address: $public_url" -ForegroundColor Cyan
          Write-Host "Username: runneradmin" -ForegroundColor Yellow
          Write-Host "Password: P@ssw0rd!" -ForegroundColor Yellow
          Write-Host "==============================================" -ForegroundColor Green
      
      - name: Keep Session Alive
        run: |
          Write-Host "RDP is running. Will stay alive for 6 hours."
          $counter = 0
          while ($counter -lt 360) {
            Write-Host "Session alive: $counter minutes elapsed"
            Start-Sleep -Seconds 60
            $counter++
          }
